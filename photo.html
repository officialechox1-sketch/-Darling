<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorite Memory ❤️</title>
    <style>
        :root {
            --navy: #0A1931;
            --deep-blue: #1A3D63;
            --mid-blue: #4A7FA7;
            --light-blue: #B3CFE5;
            --pale-white: #F6FAFD;
            --gold: #e8c97a;
            --rose: #e8a0b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--navy);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
            color: var(--pale-white);
        }

        /* Cinematic Background */
        .bg-layer {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, var(--deep-blue) 0%, var(--navy) 100%);
            z-index: -2;
        }

        .bg-photo-blur {
            position: fixed;
            inset: -10%;
            background: url('https://images.unsplash.com/photo-1518131672697-613add49090e?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
            filter: blur(60px) brightness(0.3);
            opacity: 0.4;
            z-index: -1;
            transform: scale(1.1);
            animation: bgDrift 20s infinite alternate ease-in-out;
        }

        /* Vignette Effect */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.7) 100%);
            pointer-events: none;
            z-index: 10;
        }

        /* Canvas for Sparkles & Hearts */
        #particleCanvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        /* Photo Container */
        .memory-container {
            position: relative;
            z-index: 5;
            width: 85%;
            max-width: 500px;
            aspect-ratio: 4/5;
            opacity: 0;
            transform: translateY(20px);
            animation: pageEntry 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .photo-frame {
            position: relative;
            width: 100%;
            height: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(179, 207, 229, 0.3);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(232, 201, 122, 0.2);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.6s ease;
        }

        .photo-frame::before {
            content: '';
            position: absolute;
            top: -100%;
            left: -100%;
            width: 50%;
            height: 300%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: 0s;
            pointer-events: none;
        }

        .photo-frame:hover::before {
            left: 150%;
            transition: 1.5s;
        }

        .main-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            animation: kenBurns 15s infinite alternate ease-in-out;
            transition: transform 0.8s ease, filter 0.8s ease;
        }

        /* Text Styles */
        .message {
            margin-top: 30px;
            text-align: center;
            opacity: 0;
            animation: fadeIn 3s 1.5s forwards;
            padding: 0 20px;
        }

        .message h2 {
            font-weight: 300;
            font-size: 1.2rem;
            letter-spacing: 1px;
            line-height: 1.6;
            color: var(--pale-white);
            text-shadow: 0 0 10px var(--rose);
        }

        /* Navigation Button */
        .next-btn {
            margin-top: 40px;
            padding: 12px 45px;
            background: linear-gradient(135deg, var(--gold), #c5a35d);
            border: none;
            border-radius: 50px;
            color: var(--navy);
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(232, 201, 122, 0.3);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
            pointer-events: none;
            z-index: 20;
        }

        .next-btn.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            animation: pulseGlow 2s infinite;
        }

        /* Animations */
        @keyframes pageEntry {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes kenBurns {
            0% { transform: scale(1); }
            100% { transform: scale(1.15) translate(10px, 5px); }
        }

        @keyframes bgDrift {
            0% { transform: scale(1.1) translate(0, 0); }
            100% { transform: scale(1.1) translate(-20px, -20px); }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(232, 201, 122, 0.3); }
            50% { box-shadow: 0 0 30px rgba(232, 201, 122, 0.6); }
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .memory-container { width: 90%; }
            .message h2 { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="bg-photo-blur" id="bgBlur"></div>
    <canvas id="particleCanvas"></canvas>

    <div class="memory-container">
        <div class="photo-frame" id="frame" onclick="triggerEffect(event)">
            <img src="1.png" alt="Memory" class="main-photo" id="mainPhoto">
        </div>

        <div class="message">
            <h2 id="typingText">“You are my favorite memory…<br>and my most beautiful forever ❤️”</h2>
        </div>

        <button class="next-btn" id="nextBtn" onclick="nextAction()">Next ➝</button>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const nextBtn = document.getElementById('nextBtn');
        const frame = document.getElementById('frame');
        
        let width, height;
        let particles = [];

        // Configuration
        const PHOTO_URL = "https://images.unsplash.com/photo-1518131672697-613add49090e?q=80&w=2070&auto=format&fit=crop";

        function init() {
            resize();
            createParticles();
            animate();
            
            // Fade in button after 5 seconds
            setTimeout(() => {
                nextBtn.classList.add('visible');
            }, 5000);
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);

        class Particle {
            constructor(isHeart = false) {
                this.reset(isHeart);
            }

            reset(isHeart) {
                this.x = Math.random() * width;
                this.y = height + 20;
                this.size = Math.random() * (isHeart ? 15 : 3) + 2;
                this.speedY = Math.random() * 0.5 + 0.2;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.isHeart = isHeart;
                this.color = isHeart ? '#e8a0b0' : '#F6FAFD';
            }

            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                if (this.y < -20) this.reset(this.isHeart);
            }

            draw() {
                ctx.globalAlpha = this.opacity;
                if (this.isHeart) {
                    ctx.fillStyle = this.color;
                    ctx.font = `${this.size}px serif`;
                    ctx.fillText('❤️', this.x, this.y);
                } else {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function createParticles() {
            for (let i = 0; i < 60; i++) {
                particles.push(new Particle(i % 10 === 0));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        function triggerEffect(e) {
            // Heart Burst
            for (let i = 0; i < 8; i++) {
                const burstHeart = new Particle(true);
                burstHeart.x = e.clientX || width/2;
                burstHeart.y = e.clientY || height/2;
                burstHeart.speedY = (Math.random() - 0.5) * 4;
                burstHeart.speedX = (Math.random() - 0.5) * 4;
                burstHeart.opacity = 1;
                particles.push(burstHeart);
                
                // Cleanup burst hearts
                setTimeout(() => {
                    const idx = particles.indexOf(burstHeart);
                    if (idx > -1) particles.splice(idx, 1);
                }, 2000);
            }

            // Photo Interaction
            frame.style.transform = "scale(1.03)";
            frame.style.boxShadow = "0 0 40px rgba(232, 160, 176, 0.4)";
            
            setTimeout(() => {
                frame.style.transform = "scale(1)";
                frame.style.boxShadow = "0 20px 50px rgba(0,0,0,0.5)";
            }, 600);
        }

        function nextAction() {
    document.body.style.transition = "opacity 1.5s ease";
    document.body.style.opacity = "0";
    
    setTimeout(() => {
        window.location.href = "birthday.html";
    }, 1500);
}
        init();
    </script>
</body>
</html>
