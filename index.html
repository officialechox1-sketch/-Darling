<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something Special ❤️</title>

<style>
:root {
  --navy:#0A1931;
  --gold:#e8c97a;
  --rose:#e8a0b0;
}

body {
  margin:0;
  font-family:Segoe UI;
  background:var(--navy);
  color:white;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

/* TEXT */
h2 {
  color:var(--rose);
  margin-bottom:20px;
  text-align:center;
}

/* TIMER */
.timer {
  position:relative;
  width:260px;
  height:260px;
}

/* SVG */
svg {
  transform:rotate(-90deg);
}

/* RING */
.progress {
  stroke:var(--gold);
  stroke-width:10;
  fill:none;
  filter: drop-shadow(0 0 10px var(--gold));
  transition: stroke-dashoffset 1s linear;
}

/* TEXT */
#time {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:1.6rem;
  color:var(--gold);
  letter-spacing:2px;
}

p {
  margin-top:20px;
  opacity:0.7;
}

</style>
</head>

<body>

<h2>Something special is waiting for you ❤️</h2>

<div class="timer">

<svg width="260" height="260">
  <!-- Background -->
  <circle stroke="rgba(255,255,255,0.1)" stroke-width="10"
          r="110" cx="130" cy="130"/>
  
  <!-- Progress -->
  <circle class="progress"
          r="110" cx="130" cy="130"
          id="circle"/>
</svg>

<div id="time">Loading...</div>

</div>

<p>Open exactly at midnight 😌</p>

<script>
const unlockTime = new Date("March 30, 2026 00:00:00").getTime();

const circle = document.getElementById("circle");
const radius = 110;
const circumference = 2 * Math.PI * radius;

circle.style.strokeDasharray = circumference;

function updateTimer() {
  const now = new Date().getTime();
  const diff = unlockTime - now;

  if(diff <= 0){
    window.location.href = "home.html";
    return;
  }

  const h = Math.floor(diff / (1000*60*60));
  const m = Math.floor((diff % (1000*60*60))/(1000*60));
  const s = Math.floor((diff % (1000*60))/1000);

  document.getElementById("time").innerHTML =
    `${h}h : ${m}m : ${s}s`;

  /* SMOOTH RING */
  const max = 24*60*60*1000;
  const progress = Math.min(1, Math.max(0, 1 - diff/max));
  const offset = circumference - progress * circumference;

  circle.style.strokeDashoffset = offset;

  setTimeout(updateTimer,1000);
}

updateTimer();
</script>

</body>
</html>
